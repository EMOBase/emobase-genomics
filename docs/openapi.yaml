                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b

  /uploads:
    post:
      summary: Create a TUS upload
      description: |
        Initiates a resumable file upload using the [TUS protocol v1.0.0](https://tus.io/protocols/resumable-upload).

        **Upload-Metadata fields** (each value is base64-encoded):

        | Key | Required | Description |
        |---|---|---|
        | `fileType` | Yes | One of the accepted file types (see enum below). |
        | `fileName` | Yes | File name; must end with `.gz` or `.gzip`. |
        | `version` | Conditional | Version name. Required for all file types except `fb_synonym.tsv` and `fbgn_fbtr_fbpp.tsv`. |
        | `order` | Conditional | Required when `fileType` is `orthology.tsv`. |
        | `algorithm` | Conditional | Required when `fileType` is `orthology.tsv`. |
        | `geneIDKey` | Conditional | Required when `fileType` is `genomic.gff`. GFF3 attribute key used to extract the gene ID. Supports simple keys (e.g. `ID`) and nested dot-notation keys (e.g. `Dbxref.GeneID`) to look up a `dbname:dbvalue` entry inside the attribute. |
        | `trimPrefixChars` | Conditional | Required when `fileType` is `genomic.gff`. Integer — number of characters to strip from the start of the extracted gene ID value. Use `0` for no trimming. |
        | `trimSuffixChars` | Conditional | Required when `fileType` is `genomic.gff`. Integer — number of characters to strip from the end of the extracted gene ID value. Use `0` for no trimming. |
        | `oldGeneIDKeys` | No | Comma-separated list of additional GFF3 attribute keys (same format as `geneIDKey`) whose extracted values are stored as previous/synonym gene IDs. Only used when `fileType` is `genomic.gff`. |
        | `trackName` | Conditional | Required when `fileType` is `jbrowse.track`. Human-readable display name for the JBrowse2 track. |

        **Accepted `fileType` values:**
        - `genomic.fna`
        - `genomic.gff`
        - `rna.fna`
        - `cds.fna`
        - `protein.faa`
        - `orthology.tsv`
        - `dsrna.csv` *(tcas species only; 1 active per version — re-upload replaces the previous index)*
        - `jbrowse.track` *(multiple tracks allowed per version; requires `trackName` metadata; deletable)*
        - `fb_synonym.tsv` *(versionless — `version` field not required)*
        - `fbgn_fbtr_fbpp.tsv` *(versionless — `version` field not required)*

        On success, the `Location` response header contains the URL for subsequent PATCH / HEAD requests.
      operationId: createUpload
      tags: [Uploads]
      parameters:
        - name: Tus-Resumable
          in: header
          required: true
          schema:
            type: string
            enum: ['1.0.0']
        - name: Upload-Length
          in: header
          required: true
          schema:
            type: integer
          description: Total size of the upload in bytes.
        - name: Upload-Metadata
          in: header
          required: true
          schema:
            type: string
          description: |
            Comma-separated `key base64(value)` pairs.
            Example: `fileType Z2Vub21pYy5nZmY=,fileName ZG1lbC5nZmYuZ3o=,version ZG1lbF9yNi41NA==`
      responses:
        '201':
          description: Upload created.
          headers:
            Location:
              schema:
                type: string
              description: URL of the created upload resource.
            Tus-Resumable:
              schema:
                type: string
                enum: ['1.0.0']
        '400':
          description: Invalid metadata (unknown fileType, invalid fileName, missing required fields, non-gzip extension).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidFileType:
                  summary: unknown fileType
                  value:
                    error: 'invalid fileType "genomic.xyz", must be one of: genomic.fna, genomic.gff, ...'
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                invalidExtension:
                  summary: file is not gzip
                  value:
                    error: only gzip files are accepted (.gz or .gzip)
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                versionNotFound:
                  summary: version does not exist
                  value:
                    error: 'version "dmel_r6.99" not found'
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                missingGeneIDKey:
                  summary: geneIDKey missing for genomic.gff
                  value:
                    error: 'genomic.gff uploads require a "geneIDKey" metadata field'
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                invalidTrimPrefixChars:
                  summary: trimPrefixChars is not an integer
                  value:
                    error: 'genomic.gff "trimPrefixChars" metadata field must be an integer'
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                invalidTrimSuffixChars:
                  summary: trimSuffixChars is not an integer
                  value:
                    error: 'genomic.gff "trimSuffixChars" metadata field must be an integer'
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                missingTrackName:
                  summary: trackName missing for jbrowse.track
                  value:
                    error: 'jbrowse.track uploads require a "trackName" metadata field'
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                dsrnaNotSupported:
                  summary: dsrna.csv upload attempted on non-tcas species
                  value:
                    error: dsrna.csv uploads are only supported for the tcas species
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '403':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                forbidden:
                  value:
                    error: permission denied
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '409':
          description: A job for this file type is already pending or running for the given version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                conflict:
                  value:
                    error: a job for file type "genomic.gff" is already pending or running for this version
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b

  /uploads/{id}:
    head:
      summary: Query upload offset (TUS)
      description: Returns the current byte offset of a resumable upload.
      operationId: getUploadOffset
      tags: [Uploads]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Upload ID returned in the `Location` header of the create response.
        - name: Tus-Resumable
          in: header
          required: true
          schema:
            type: string
            enum: ['1.0.0']
      responses:
        '200':
          description: Current offset.
          headers:
            Upload-Offset:
              schema:
                type: integer
              description: Number of bytes already uploaded.
            Upload-Length:
              schema:
                type: integer
              description: Total upload size in bytes.
            Tus-Resumable:
              schema:
                type: string
                enum: ['1.0.0']
        '403':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                forbidden:
                  value:
                    error: permission denied
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '404':
          description: Upload not found.

    patch:
      summary: Upload a chunk (TUS)
      description: |
        Appends bytes to an in-progress upload. When the final chunk is received and the file is valid,
        the server enqueues background processing jobs and returns them in the `X-Jobs` response header
        as a JSON array of `JobSummary` objects.
      operationId: uploadChunk
      tags: [Uploads]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: Tus-Resumable
          in: header
          required: true
          schema:
            type: string
            enum: ['1.0.0']
        - name: Upload-Offset
          in: header
          required: true
          schema:
            type: integer
          description: Byte offset at which this chunk begins.
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            enum: [application/offset+octet-stream]
      requestBody:
        required: true
        content:
          application/offset+octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '204':
          description: Chunk accepted. On the final chunk, `X-Jobs` and `X-Job-IDs` are included with the enqueued processing jobs.
          headers:
            Upload-Offset:
              schema:
                type: integer
              description: New byte offset after this chunk.
            Tus-Resumable:
              schema:
                type: string
                enum: ['1.0.0']
            X-Jobs:
              schema:
                type: string
              description: |
                JSON array of `JobSummary` objects for all enqueued processing jobs.
                Present only on the final chunk of versioned file uploads.
            X-Job-IDs:
              deprecated: true
              schema:
                type: string
              description: |
                Deprecated. Comma-separated list of enqueued job IDs. Use `X-Jobs` instead.
                Present only on the final chunk of versioned file uploads.
        '403':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                forbidden:
                  value:
                    error: permission denied
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '404':
          description: Upload not found.
        '422':
          description: Uploaded file is not a valid gzip archive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notGzip:
                  value:
                    error: uploaded file is not a valid gzip
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b

  /upload-files:
    get:
      summary: List upload files for a version
      operationId: listUploadFiles
      tags: [Uploads]
      parameters:
        - name: version
          in: query
          required: true
          schema:
            type: string
          description: Version name (e.g. `dmel_r6.54`).
      responses:
        '200':
          description: All non-deleted upload files for the given version, ordered by creation time descending.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UploadFileSummary'
                  requestId:
                    type: string
        '400':
          description: Missing `version` query parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingVersion:
                  value:
                    error: version query parameter is required
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '403':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                forbidden:
                  value:
                    error: permission denied
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '404':
          description: Version not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notFound:
                  value:
                    error: version not found
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b

  /upload-files/{id}:
    delete:
      summary: Delete an upload file
      description: |
        Enqueues an async delete job for the uploaded file. Only files of type `orthology.tsv`
        and `jbrowse.track` may be deleted. The appropriate job type is selected automatically:
        - `orthology.tsv` → enqueues `ORTHOLOGY.TSV:DELETE`
        - `jbrowse.track` → enqueues `JBROWSE.TRACK:DELETE` (runs `jbrowse remove-track`, then soft-deletes the record and removes the file from disk)

        The deletion is processed asynchronously by the worker.
      operationId: deleteUploadFile
      tags: [Uploads]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Upload file ID (UUID).
      responses:
        '200':
          description: Delete job enqueued successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/JobSummary'
                  requestId:
                    type: string
                    example: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '403':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                forbidden:
                  value:
                    error: permission denied
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '404':
          description: Upload file not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notFound:
                  value:
                    error: upload file not found
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '409':
          description: A delete job for this file is already pending or running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                deletePending:
                  value:
                    error: a delete job for this file is already pending or running
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '422':
          description: File type cannot be deleted (only `orthology.tsv` and `jbrowse.track` files are deletable).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notDeletable:
                  value:
                    error: this file type cannot be deleted
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b

tags:
  - name: Search
    description: Gene search, autocomplete, silencing sequences across synonym, orthology, and dsRNA indexes.
  - name: Genes
    description: Gene detail lookup — genomic location, sequences, and synonyms.
  - name: Orthology
    description: Direct orthology lookup by known gene IDs.
  - name: Versions
    description: Genome version management.
  - name: Jobs
    description: Background processing job tracking.
  - name: Uploads
    description: Resumable file uploads (TUS protocol v1.0.0).
  - name: System
    description: Infrastructure endpoints.
