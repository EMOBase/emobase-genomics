  /versions/{name}:
    delete:
      summary: Delete a version
      operationId: deleteVersion
      tags: [Versions]
      description: |
        Permanently deletes a version and all of its associated data:
        - Upload file records are hard-deleted from the database and their files are removed from disk.
        - All jobs for the version are deleted.
        - All Elasticsearch indexes for the version are deleted (`genomiclocation`, `sequence`, `orthology`, `synonym`).

        **Preconditions** (returns 422 if not met):
        - The version must not be the current default version.
        - The version must have no active (PENDING or RUNNING) jobs.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Version name (e.g. `dmel_r6.54`).
      responses:
        '204':
          description: Version and all related data deleted successfully.
        '403':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                forbidden:
                  value:
                    error: permission denied
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '404':
          description: Version not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notFound:
                  value:
                    error: version not found
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '422':
          description: Precondition not met.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                isDefault:
                  summary: Version is the current default
                  value:
                    error: cannot delete the default version
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                hasActiveJobs:
                  summary: Version has active jobs
                  value:
                    error: version has active jobs
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b

  /versions/{name}/release:
    post:
      summary: Release a version
      operationId: releaseVersion
      tags: [Versions]
      description: |
        Enqueues `GENOMIC.FNA:SETUP_BLAST`, `PROTEIN.FAA:SETUP_BLAST`, and `RNA.FNA:SETUP_BLAST`
        jobs for the latest completed file of each type. Once all three jobs succeed, the version
        is automatically promoted to the default and the BLAST container is restarted.

        **Preconditions** (returns 422 if not met):
        - `genomic.fna` and `genomic.gff` must have at least one completed upload.
        - All jobs generated from the latest completed file of every uploaded type must be in `DONE` state.

        If a non-failed blast job already exists for a given type it is skipped (idempotent per type).
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Version name (e.g. `dmel_r6.54`).
      responses:
        '200':
          description: Blast jobs enqueued. Returns the version and the newly created jobs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/Version'
                      - type: object
                        required: [jobs]
                        properties:
                          jobs:
                            type: array
                            description: Blast jobs created by this release call. Empty if all blast jobs already existed.
                            items:
                              $ref: '#/components/schemas/JobSummary'
                  requestId:
                    type: string
        '403':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                forbidden:
                  value:
                    error: permission denied
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '404':
          description: Version not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notFound:
                  value:
                    error: version not found
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '422':
          description: Precondition not met.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                requiredFileNotUploaded:
                  summary: A required file has not been uploaded yet
                  value:
                    error: "required file not uploaded: genomic.fna"
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                fileJobsNotComplete:
                  summary: Jobs for the latest uploaded file of some type are not all done
                  value:
                    error: "file jobs not complete: rna.fna"
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b

