openapi: 3.0.3
info:
  title: EMOBase Genomics API
  version: 1.0.0

servers:
  - url: localhost:8000
    description: Local development server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [error, requestId]
      properties:
        error:
          type: string
        requestId:
          type: string
          example: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b

    Version:
      type: object
      required: [id, name, createdAt, createdBy, updatedAt, updatedBy]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: dmel_r6.54
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          example: admin
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
          example: admin

    VersionItem:
      allOf:
        - $ref: '#/components/schemas/Version'
        - type: object
          required: [isDefault, status]
          properties:
            isDefault:
              type: boolean
              description: Whether this is the currently configured default version.
            totalFileSize:
              type: integer
              format: int64
              description: Sum of `file_size` for all non-deleted upload files belonging to this version, in bytes.
              example: 1073741824
            status:
              type: string
              enum: [DRAFT, PROCESSING, MISSING_REQUIRED_FILE, ERROR, READY]
              description: |
                Derived from the state of jobs associated with this version.
                - `DRAFT` — no jobs exist.
                - `PROCESSING` — at least one job is PENDING or RUNNING.
                - `ERROR` — at least one job is FAILED.
                - `MISSING_REQUIRED_FILE` — at least one of the required files (`genomic.fna`, `genomic.gff`) has not been uploaded yet.
                - `READY` — all jobs are DONE.

                Beside `DRAFT` and `READY`, these states are not mutually exclusive.
                The order of precedence is: PROCESSING > ERROR > MISSING_REQUIRED_FILE.

    VersionList:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/VersionItem'
        total:
          type: integer
          description: Total number of versions across all pages.
          example: 42
        page:
          type: integer
          description: Current page number (1-based).
          example: 1
        pageSize:
          type: integer
          description: Number of items per page.
          example: 20

    JobStatus:
      type: string
      enum: [PENDING, RUNNING, DONE, FAILED]
      description: |
        - `PENDING` — queued, not yet picked up by a worker.
        - `RUNNING` — currently being processed by a worker.
        - `DONE` — completed successfully.
        - `FAILED` — processing failed; see `resultMetadata` or `error` for details.

    JobType:
      type: string
      enum:
        - GENOMIC.GFF
        - RNA.FNA
        - CDS.FNA
        - PROTEIN.FAA
        - ORTHOLOGY.TSV
        - ORTHOLOGY.TSV:DELETE
        - GENOMIC.GFF:SYNONYM
        - GENOMIC.FNA:SETUP_BLAST
        - PROTEIN.FAA:SETUP_BLAST
        - RNA.FNA:SETUP_BLAST
        - GENOMIC.FNA:SETUP_JBROWSE2
        - GENOMIC.GFF:SETUP_JBROWSE2
        - DSRNA.CSV
        - JBROWSE.TRACK
        - JBROWSE.TRACK:DELETE
      description: |
        Identifies which file type and pipeline the job processes.
        - `GENOMIC.GFF` — parse genomic feature annotations (GFF3).
        - `RNA.FNA` — parse RNA FASTA sequences.
        - `CDS.FNA` — parse CDS FASTA sequences.
        - `PROTEIN.FAA` — parse protein FASTA sequences.
        - `ORTHOLOGY.TSV` — parse orthology group mappings.
        - `ORTHOLOGY.TSV:DELETE` — delete orthology TSV file (async).
        - `GENOMIC.GFF:SYNONYM` — build gene synonyms from GFF3.
        - `GENOMIC.FNA:SETUP_BLAST` — build genome BLAST database.
        - `PROTEIN.FAA:SETUP_BLAST` — build protein BLAST database.
        - `RNA.FNA:SETUP_BLAST` — build RNA BLAST database.
        - `GENOMIC.FNA:SETUP_JBROWSE2` — register the genome assembly in JBrowse2.
        - `GENOMIC.GFF:SETUP_JBROWSE2` — add the annotation track and rebuild the JBrowse2 text index.
        - `DSRNA.CSV` — parse dsRNA CSV and index silencing sequences (tcas only).
        - `JBROWSE.TRACK` — register an uploaded track file in JBrowse2 (`jbrowse add-track`).
        - `JBROWSE.TRACK:DELETE` — remove a JBrowse2 track and soft-delete the upload record (`jbrowse remove-track`).

    JobSummary:
      type: object
      required: [id, versionId, type, description, status, payload]
      properties:
        id:
          type: integer
          format: int64
          example: 7
        versionId:
          type: integer
          format: int64
          example: 1
        fileId:
          type: string
          nullable: true
          description: ID of the upload file this job was created for.
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        type:
          $ref: '#/components/schemas/JobType'
        description:
          type: string
          description: Human-readable title for display in the UI.
          example: Parse genomic GFF file
        status:
          $ref: '#/components/schemas/JobStatus'
        payload:
          description: Job-specific input parameters stored at enqueue time.
          nullable: true
        error:
          type: string
          description: Error message from the worker. Present only when `status` is `FAILED`.
          example: failed to open file "/uploads/dmel/genomic.gff.gz"

    FileDetail:
      type: object
      description: An uploaded file together with all its associated jobs.
      required: [id, filePath, fileSize, uploadStatus, createdAt, createdBy, jobs]
      properties:
        id:
          type: string
          description: TUS upload ID (UUID).
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        filePath:
          type: string
          example: dmel_r6.59/genomic.gff.gz
        fileSize:
          type: integer
          format: int64
          example: 104857600
        uploadStatus:
          type: string
          enum: [UPLOADING, COMPLETED, FAILED]
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          example: admin
        completedAt:
          type: string
          format: date-time
          nullable: true
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/FileJobSummary'

    FileJobSummary:
      type: object
      description: A job summary as returned inside a FileDetail (excludes versionId/fileId).
      required: [id, type, description, status, payload]
      properties:
        id:
          type: integer
          format: int64
          example: 7
        type:
          $ref: '#/components/schemas/JobType'
        description:
          type: string
          example: Parse genomic GFF file
        status:
          $ref: '#/components/schemas/JobStatus'
        payload:
          description: Job-specific input parameters stored at enqueue time.
          nullable: true
        error:
          type: string
          nullable: true
          description: Error message from the worker. Present only when `status` is `FAILED`.

    VersionDetailFiles:
      type: object
      description: |
        Uploaded files grouped by type. For all types except `orthology.tsv` and
        `jbrowse.track`, only the latest non-deleted file is returned (or `null` if none
        exists). For `orthology.tsv` and `jbrowse.track`, all non-deleted files are returned.
      properties:
        genomic.fna:
          $ref: '#/components/schemas/FileDetail'
          nullable: true
        genomic.gff:
          $ref: '#/components/schemas/FileDetail'
          nullable: true
        rna.fna:
          $ref: '#/components/schemas/FileDetail'
          nullable: true
        cds.fna:
          $ref: '#/components/schemas/FileDetail'
          nullable: true
        protein.faa:
          $ref: '#/components/schemas/FileDetail'
          nullable: true
        dsrna.csv:
          $ref: '#/components/schemas/FileDetail'
          nullable: true
          description: Latest non-deleted dsRNA CSV file, or `null`. Only available when `main_species` is `tcas`.
        orthology.tsv:
          type: array
          items:
            $ref: '#/components/schemas/FileDetail'
        jbrowse.track:
          type: array
          description: All non-deleted JBrowse2 track files for this version.
          items:
            $ref: '#/components/schemas/FileDetail'

    UploadFileSummary:
      type: object
      required: [id, versionId, fileType, fileSize, uploadStatus, createdAt, createdBy]
      properties:
        id:
          type: string
          description: TUS upload ID (UUID).
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        versionId:
          type: integer
          format: int64
          example: 1
        fileType:
          type: string
          enum: [genomic.fna, genomic.gff, rna.fna, cds.fna, protein.faa, orthology.tsv, dsrna.csv, jbrowse.track, fb_synonym.tsv, fbgn_fbtr_fbpp.tsv]
          example: genomic.gff
        fileSize:
          type: integer
          format: int64
          description: File size in bytes.
          example: 104857600
        uploadStatus:
          type: string
          enum: [UPLOADING, COMPLETED, FAILED]
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          example: admin
        completedAt:
          type: string
          format: date-time
          nullable: true

    GeneWithSynonyms:
      type: object
      required: [gene, synonyms]
      properties:
        gene:
          type: string
          description: Gene identifier with the species prefix stripped.
          example: TC016177
        synonyms:
          type: array
          items:
            type: string
          description: Non-primary synonyms for this gene (names, symbols, etc.). Empty when the gene did not match the query directly.
          example: ["CG9533", "vermilion"]

    GeneGroup:
      type: object
      required: [species, genes]
      properties:
        species:
          type: string
          description: Four-letter species code (e.g. `Tcas`, `Dmel`).
          example: Dmel
        genes:
          type: array
          items:
            $ref: '#/components/schemas/GeneWithSynonyms'

    OrthologyResult:
      type: object
      required: [group, source, orthologs]
      properties:
        group:
          type: string
          description: Orthology group identifier from the source database.
          example: OG0001234
        source:
          type: string
          description: Algorithm or database that produced this orthology group.
          example: OrthoMCL
        orthologs:
          type: array
          description: Gene groups per species — main species first, then alphabetical.
          items:
            $ref: '#/components/schemas/GeneGroup'

    OtherGene:
      type: object
      required: [species, gene]
      properties:
        species:
          type: string
          description: Four-letter species code.
          example: Dmel
        gene:
          type: string
          description: Gene identifier with the species prefix stripped.
          example: FBgn0003996

    SearchResult:
      type: object
      description: |
        At most one of `genes`, `orthologies`, or `otherGenes` is populated.
        All three are absent when no match is found.

        - `genes` — query matched a **main-species** gene; contains the matching gene IDs (species prefix stripped).
        - `orthologies` — query matched a gene from **another species** and orthology groups were found; each group is enriched with synonyms from the query.
        - `otherGenes` — query matched a gene from **another species** but no orthology groups were found.
      properties:
        genes:
          type: array
          items:
            type: string
          example: ["TC016177", "TC016178"]
        orthologies:
          type: array
          items:
            $ref: '#/components/schemas/OrthologyResult'
        otherGenes:
          type: array
          items:
            $ref: '#/components/schemas/OtherGene'

    OrthologItem:
      type: object
      required: [gene, source]
      properties:
        gene:
          type: string
          description: Orthologous gene identifier with the species prefix stripped.
          example: FBgn0003996
        source:
          type: string
          description: Algorithm or database that produced this orthology relationship.
          example: OrthoMCL

    GeneOrthology:
      type: object
      required: [gene, orthologs]
      properties:
        gene:
          type: string
          description: Queried gene identifier with the species prefix stripped.
          example: TC016177
        orthologs:
          type: array
          description: Orthologous genes from other species across all matching orthology groups.
          items:
            $ref: '#/components/schemas/OrthologItem'

    Synonym:
      type: object
      required: [gene, type, synonym]
      properties:
        gene:
          type: string
          description: Full gene identifier including species prefix (e.g. `Tcas:TC016177`).
          example: Tcas:TC016177
        type:
          type: string
          enum: [CURRENT_ID, NAME, SYMBOL, DSRNA, OLD_ID, TRANSCRIPT, PROTEIN, OTHER]
          description: Category of this synonym.
          example: SYMBOL
        synonym:
          type: string
          description: The synonym value (gene name, transcript ID, protein ID, etc.).
          example: vermilion

    GeneSequence:
      type: object
      required: [id, seq]
      properties:
        id:
          type: string
          description: Sequence name / identifier.
          example: TC016177-RA
        seq:
          type: string
          description: Raw sequence string (nucleotide or amino acid).
          example: ATGCGT...

    SilencingSeq:
      type: object
      required: [id, geneIds, seq]
      description: A dsRNA silencing sequence record with its associated gene IDs and primer information.
      properties:
        id:
          type: string
          description: iB number (species prefix stripped).
          example: iB-00001
        geneIds:
          type: array
          items:
            type: string
          description: Gene IDs associated with this silencing sequence (species prefix stripped).
          example: ["TC016177"]
        seq:
          type: string
          description: dsRNA nucleotide sequence.
          example: ATGCGT...
        leftPrimer:
          type: string
          description: Left primer sequence. Omitted when not present.
          example: GCTAGCTAGC
        rightPrimer:
          type: string
          description: Right primer sequence. Omitted when not present.
          example: CTAGCTAGCT

    GeneDetail:
      type: object
      required: [id, start, end, strand, seqname, mRNAs, proteins, CDS, synonyms]
      properties:
        id:
          type: string
          description: Gene identifier with the species prefix stripped.
          example: TC016177
        start:
          type: integer
          description: Genomic start position (1-based).
          example: 1234567
        end:
          type: integer
          description: Genomic end position (1-based, inclusive).
          example: 1240000
        strand:
          type: string
          description: DNA strand.
          example: "+"
        seqname:
          type: string
          description: Reference sequence / chromosome name.
          example: CM009943.2
        mRNAs:
          type: array
          items:
            $ref: '#/components/schemas/GeneSequence'
        proteins:
          type: array
          items:
            $ref: '#/components/schemas/GeneSequence'
        CDS:
          type: array
          items:
            $ref: '#/components/schemas/GeneSequence'
        synonyms:
          type: array
          description: All synonyms for this gene (CURRENT_ID, NAME, SYMBOL, TRANSCRIPT, PROTEIN, etc.).
          items:
            $ref: '#/components/schemas/Synonym'

    VersionDetail:
      type: object
      required: [id, name, isDefault, status, createdAt, createdBy, updatedAt, updatedBy, files]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: dmel_r6.59
        isDefault:
          type: boolean
        status:
          type: string
          enum: [DRAFT, PROCESSING, MISSING_REQUIRED_FILE, ERROR, READY]
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          example: admin
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
          example: admin
        files:
          $ref: '#/components/schemas/VersionDetailFiles'

paths:
  /health:
    get:
      summary: Health check
      security: []
      operationId: healthCheck
      tags: [System]
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                    example: OK
                  requestId:
                    type: string
                    example: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b

  /search/_suggest:
    get:
      summary: Autocomplete gene synonyms
      operationId: suggestGeneSynonyms
      security: []
      tags: [Search]
      description: |
        Returns up to 100 autocomplete suggestions for the given prefix using the
        Elasticsearch completion suggester on the `synonym.suggest` field.

        Results are ranked by synonym type:
        - `SYMBOL` → boost 12
        - `NAME` → boost 8
        - `CURRENT_ID`, `DSRNA`, `OLD_ID` → boost 4
        - `OTHER` → boost 1

        Duplicate suggestions are suppressed. Returns an empty array when no prefix
        match is found or the synonym index does not exist yet.
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Prefix to autocomplete (e.g. `"TC01"`).
          example: TC01
        - name: version
          in: query
          required: false
          schema:
            type: string
          description: Version name (e.g. `dmel_r6.54`). Defaults to the configured default version.
          example: dmel_r6.54
      responses:
        '200':
          description: List of matching synonym strings, ranked by type relevance.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string
                    example: ["TC016177", "TC016178", "TC016179"]
                  requestId:
                    type: string
                    example: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '400':
          description: Missing `query` parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingQuery:
                  value:
                    error: query parameter is required
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '404':
          description: The specified version does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notFound:
                  value:
                    error: version not found
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '422':
          description: No `version` param provided and no default version is configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                noDefault:
                  value:
                    error: no default version configured
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b

  /search:
    get:
      summary: Search genes
      operationId: searchGenes
      security: []
      tags: [Search]
      description: |
        Searches for genes by synonym (gene ID, name, symbol, transcript ID, etc.) across
        the Elasticsearch synonym index for a given version.

        The query is case-insensitive and treats hyphens as spaces (via the `synonym_analyzer`).

        The result shape depends on where the match is found:
        - If the query matches a **main-species** gene → `genes` is populated.
        - If the query matches a gene from **another species** and orthology groups are found → `orthologies` is populated, each group enriched with the synonyms returned by the query.
        - If the query matches a gene from **another species** with no orthology data → `otherGenes` is populated.

        All three fields are absent when no match is found.
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Search term (gene ID, name, symbol, …). Case-insensitive; hyphens treated as spaces.
          example: TC016177
        - name: version
          in: query
          required: false
          schema:
            type: string
          description: |
            Version name (e.g. `dmel_r6.54`). Defaults to the configured default version.
            Returns 422 if omitted and no default version is set.
          example: dmel_r6.54
      responses:
        '200':
          description: Search executed successfully. One of `genes`, `orthologies`, or `otherGenes` is populated; all are absent on no match.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SearchResult'
                  requestId:
                    type: string
              examples:
                mainSpeciesMatch:
                  summary: Query matched main-species genes
                  value:
                    data:
                      genes: ["TC016177", "TC016178"]
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                orthologyMatch:
                  summary: Query matched another species — orthology found
                  value:
                    data:
                      orthologies:
                        - group: OG0001234
                          source: OrthoMCL
                          orthologs:
                            - species: Tcas
                              genes:
                                - gene: TC016177
                                  synonyms: []
                            - species: Dmel
                              genes:
                                - gene: FBgn0003996
                                  synonyms: ["v", "vermilion"]
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                otherGeneMatch:
                  summary: Query matched another species — no orthology
                  value:
                    data:
                      otherGenes:
                        - species: Dmel
                          gene: FBgn0003996
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                noMatch:
                  summary: No match found
                  value:
                    data: {}
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '400':
          description: Missing `query` parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingQuery:
                  value:
                    error: query parameter is required
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '404':
          description: The specified version does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notFound:
                  value:
                    error: version not found
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '422':
          description: No `version` param provided and no default version is configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                noDefault:
                  value:
                    error: no default version configured
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b

  /genes/{species}:
    get:
      summary: Get gene details for a species
      operationId: getGenesBySpecies
      security: []
      tags: [Genes]
      description: |
        Returns genomic location, associated sequences (mRNAs, proteins, CDS), and all
        synonyms for the given gene IDs belonging to `species`.

        Gene IDs are resolved via an exact synonym lookup (`CURRENT_ID` or `OLD_ID` type),
        so both current and old identifiers are accepted in `ids`.

        Only genes that have a genomic location entry are included in the response.
      parameters:
        - name: species
          in: path
          required: true
          schema:
            type: string
          description: Four-letter species code (e.g. `Tcas`, `Dmel`).
          example: Tcas
        - name: ids
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated list of gene IDs without species prefix.
          example: TC016177,TC000291
        - name: version
          in: query
          required: false
          schema:
            type: string
          description: Version name (e.g. `dmel_r6.54`). Defaults to the configured default version.
          example: dmel_r6.54
      responses:
        '200':
          description: Gene details for the matched genes. Empty array when no genes are found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GeneDetail'
                  requestId:
                    type: string
              examples:
                found:
                  summary: Genes found
                  value:
                    data:
                      - id: TC016177
                        start: 1234567
                        end: 1240000
                        strand: "+"
                        seqname: CM009943.2
                        mRNAs:
                          - id: TC016177-RA
                            seq: ATGCGT...
                        proteins:
                          - id: TC016177-PA
                            seq: MRCGT...
                        CDS:
                          - id: TC016177-RA
                            seq: ATGCGT...
                        synonyms:
                          - gene: Tcas:TC016177
                            type: CURRENT_ID
                            synonym: TC016177
                          - gene: Tcas:TC016177
                            type: SYMBOL
                            synonym: vermilion
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                notFound:
                  summary: No genes found
                  value:
                    data: []
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '400':
          description: Missing `ids` parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingIds:
                  value:
                    error: ids parameter is required
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '404':
          description: The specified version does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notFound:
                  value:
                    error: version not found
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '422':
          description: No `version` param provided and no default version is configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                noDefault:
                  value:
                    error: no default version configured
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b

  /silencingseqs:
    get:
      summary: Get silencing sequences
      operationId: getSilencingSeqs
      security: []
      tags: [Search]
      description: |
        Returns dsRNA silencing sequence records for the given iB numbers (`ids`) or
        gene IDs (`geneIds`).

        **Constraints:**
        - Only available when `main_species` is `tcas`. Returns 400 otherwise.
        - `ids` and `geneIds` are mutually exclusive — pass exactly one. Returns 400 if both are provided.
        - When querying by `geneIds`, the response includes all silencing sequences that have the
          given genes as synonyms via a `DSRNA` synonym relationship.
        - When neither parameter is provided an empty array is returned.
      parameters:
        - name: ids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated list of iB numbers (without species prefix) to look up directly.
          example: iB-00001,iB-00002
        - name: geneIds
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated list of gene IDs (without species prefix) whose associated silencing sequences should be returned.
          example: TC016177,TC000291
        - name: version
          in: query
          required: false
          schema:
            type: string
          description: Version name (e.g. `tcas_5.2`). Defaults to the configured default version.
          example: tcas_5.2
      responses:
        '200':
          description: Silencing sequence records matching the query. Empty array when none are found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SilencingSeq'
                  requestId:
                    type: string
              examples:
                byIds:
                  summary: Query by iB numbers
                  value:
                    data:
                      - id: iB-00001
                        geneIds: ["TC016177"]
                        seq: ATGCGT...
                        leftPrimer: GCTAGCTAGC
                        rightPrimer: CTAGCTAGCT
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                byGeneIds:
                  summary: Query by gene IDs
                  value:
                    data:
                      - id: iB-00001
                        geneIds: ["TC016177"]
                        seq: ATGCGT...
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                empty:
                  summary: No records found
                  value:
                    data: []
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '400':
          description: Both `ids` and `geneIds` provided, or `main_species` is not `tcas`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                bothParams:
                  summary: ids and geneIds are mutually exclusive
                  value:
                    error: ids and geneIds are mutually exclusive
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                notTcas:
                  summary: main_species is not tcas
                  value:
                    error: silencingseqs is only supported when main_species is "tcas"
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '404':
          description: The specified version does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notFound:
                  value:
                    error: version not found
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '422':
          description: No `version` param provided and no default version is configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                noDefault:
                  value:
                    error: no default version configured
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b

  /orthology/{species}:
    get:
      summary: Get orthology for genes of a species
      operationId: getOrthologyBySpecies
      security: []
      tags: [Orthology]
      description: |
        Returns orthology groups for the given gene IDs belonging to `species`.
        Each gene in the result is paired with its orthologs from all other species
        found in matching groups.

        Only genes that appear in at least one orthology group are included in the response.
        Genes with no orthology data are silently omitted.
      parameters:
        - name: species
          in: path
          required: true
          schema:
            type: string
          description: Four-letter species code (e.g. `Tcas`, `Dmel`).
          example: Tcas
        - name: genes
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated list of gene IDs without species prefix.
          example: TC003413,TC000291
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: all
          description: Filter by orthology source algorithm (e.g. `OrthoMCL`). Use `all` to include every source.
          example: OrthoMCL
        - name: version
          in: query
          required: false
          schema:
            type: string
          description: Version name (e.g. `dmel_r6.54`). Defaults to the configured default version.
          example: dmel_r6.54
      responses:
        '200':
          description: Orthology groups for the queried genes. Empty array when no orthology data is found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GeneOrthology'
                  requestId:
                    type: string
              examples:
                found:
                  summary: Orthology found for queried genes
                  value:
                    data:
                      - gene: TC003413
                        orthologs:
                          - gene: FBgn0003996
                            source: OrthoMCL
                          - gene: AGAP001234
                            source: OrthoMCL
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
                notFound:
                  summary: No orthology found
                  value:
                    data: []
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '400':
          description: Missing `genes` parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingGenes:
                  value:
                    error: genes parameter is required
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '404':
          description: The specified version does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notFound:
                  value:
                    error: version not found
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        '422':
          description: No `version` param provided and no default version is configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                noDefault:
                  value:
                    error: no default version configured
                    requestId: 7f3e2a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b

