main_species: Ptep

http:
  port: 8080
  mode: release # debug, test, release

mysql:
  host: localhost
  port: 3306
  user: emobase
  password:
  database: emobase_genomics

jobs:
  poll_interval: 1s
  stuck_interval: 5m
  stuck_timeout: 30m

elasticsearch:
  addresses:
    - http://localhost:9200

blast:
  display_name: OGS3  # used as the title prefix in makeblastdb (e.g. "OGS3 Genome")
  db_path: /db        # directory where makeblastdb writes its output databases

uploads:
  dir: ./public/uploads

dev:
  upload_chunk_delay: 0ms # set to e.g. "500ms" to simulate slow uploads
