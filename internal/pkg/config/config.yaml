main_species: Ptep

http:
  port: 8080
  mode: release # debug, test, release

mysql:
  host: localhost
  port: 3306
  user: emobase
  password:
  database: emobase_genomics

jobs:
  max_retry_count: 3
  poll_interval: 1s
  stuck_interval: 5m
  stuck_timeout: 30m

elasticsearch:
  addresses:
    - http://localhost:9200

dev:
  upload_chunk_delay: 500ms # set to e.g. "500ms" to simulate slow uploads
