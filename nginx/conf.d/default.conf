# Preserve X-Forwarded-Host set by an upstream reverse proxy; fall back to
# the Host header seen by nginx when no upstream value is present.
map $http_x_forwarded_host $forwarded_host {
    ""      $http_host;
    default $http_x_forwarded_host;
}

# Preserve X-Forwarded-Proto set by an upstream reverse proxy; fall back to
# the scheme seen by nginx when no upstream value is present.
map $http_x_forwarded_proto $forwarded_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

upstream emobase_genomics_api {
    server api:8080; # "api" matches the service name in docker-compose.yml
    keepalive 32;
}

upstream emobase_genomics_blast {
    server blast:4567; # "blast" matches the service name in docker-compose.yml
    keepalive 8;
}

server {
    listen 80 default_server;

    server_name _; # catch-all; replace with your domain if needed

    # ── Proxy settings ────────────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Connection ""; # enable HTTP/1.1 keep-alive to upstream
    proxy_set_header Host $host:$server_port;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;

    # ── Forward API traffic ──────────────────────────────────
    location /api/v1/ {
        proxy_pass http://emobase_genomics_api/;
    }

    # ── File uploads ──────────────────────────────────────────────────────────
    # proxy_set_header here overrides the server-level Host directive, so we
    # must restate it explicitly alongside the TUS-specific forwarded headers.
    # RespectForwardedHeaders=true is set in the Go tusd config so it reads
    # X-Forwarded-Host/Proto to build the correct Location URL.
    location /api/v1/uploads {
        proxy_pass http://emobase_genomics_api/uploads;

        client_max_body_size 30m;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_http_version 1.1;

        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # ── Serve uploaded files statically via nginx (bypass the API) ────────────
    location /public/uploads/ {
        alias /var/www/public/uploads/;


        # Disable directory listing
        autoindex off;

        # Only allow known file types; block everything else
        location ~* \.(gz|gzip)$ {
            add_header Content-Encoding gzip;

            # Disable fixed-time caching — files may mutate mid-upload (TUS protocol)
            # Instead, rely on ETag + Last-Modified for conditional revalidation
            expires off; # no Expires / max-age header
            add_header Cache-Control "no-cache, must-revalidate";
            add_header X-Content-Type-Options nosniff;

            # Prevent nginx from re-compressing an already-gzipped file
            gzip off;

            # nginx emits ETag and Last-Modified by default; these let the browser
            # send If-None-Match / If-Modified-Since on the next request so nginx
            # can return a 304 Not Modified (no body) if the file hasn't changed,
            # instead of always downloading the full file.
            etag on;
            if_modified_since exact;

            try_files $uri =404;
        }

        return 403;
    }

    # ── BLAST (SequenceServer) ────────────────────────────────────────────────
    location /blast/ {
        proxy_pass http://emobase_genomics_blast/;
        proxy_set_header X-Script-Name /blast;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_intercept_errors on;
        proxy_connect_timeout 8s;
        proxy_read_timeout 180s;
    }

    # ── JBrowse2 ──────────────────────────────────────────────────────────────
    location ~ ^/jbrowse2(/.*)?$ {
        alias /jbrowse2$1;
        add_header Access-Control-Allow-Origin *;
        include /etc/nginx/mime.types;
    }

    # ── Health-check endpoint (answered by nginx itself) ──────────────────────
    location /health/nginx {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
