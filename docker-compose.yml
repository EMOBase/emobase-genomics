name: emobase-genomics

services:
  db-migrate:
    build: .
    container_name: emobase_genomics_db_migrate
    restart: no
    command: ["db:migrate", "-c", "/app/config.yaml"]
    environment:
      MYSQL__HOST: mysql
      MYSQL__PORT: 3306
      MYSQL__USER: ${MYSQL__USER:-emobase}
      MYSQL__PASSWORD: ${MYSQL__PASSWORD}
      MYSQL__DATABASE: ${MYSQL__DATABASE:-emobase_genomics}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend
    profiles:
      - migrate

  es-migrate:
    build: .
    container_name: emobase_genomics_es_migrate
    restart: no
    command: ["es:migrate", "-c", "/app/config.yaml"]
    environment:
      ELASTICSEARCH__ADDRESSES: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - backend
    profiles:
      - migrate

  setup-jbrowse2-web:
    build: .
    container_name: emobase_genomics_setup_jbrowse2_web
    restart: no
    entrypoint: []
    command: ["jbrowse", "create", "/web"]
    volumes:
      - ./data/jbrowse2:/web/
    profiles:
      - migrate

  api:
    build: .
    container_name: emobase_genomics_api
    restart: unless-stopped
    command: ["api", "-c", "/app/config.yaml"]
    environment:
      HTTP__MODE: ${HTTP__MODE:-release}
      MYSQL__HOST: mysql
      MYSQL__PORT: 3306
      MYSQL__USER: ${MYSQL__USER:-emobase}
      MYSQL__PASSWORD: ${MYSQL__PASSWORD}
      MYSQL__DATABASE: ${MYSQL__DATABASE:-emobase_genomics}
      ELASTICSEARCH__ADDRESSES: http://elasticsearch:9200
    expose:
      - "8080" # internal only, not bound to host
    volumes:
      - ./data/public/uploads:/app/public/uploads
      - ./data/jbrowse2:/web/
      - blast_data:/db/
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - backend

  worker-1:
    build: .
    container_name: emobase_genomics_worker_1
    restart: unless-stopped
    command: ["worker", "-c", "/app/config.yaml"]
    environment:
      MYSQL__HOST: mysql
      MYSQL__PORT: 3306
      MYSQL__USER: ${MYSQL__USER:-emobase}
      MYSQL__PASSWORD: ${MYSQL__PASSWORD}
      MYSQL__DATABASE: ${MYSQL__DATABASE:-emobase_genomics}
      ELASTICSEARCH__ADDRESSES: http://elasticsearch:9200
    volumes:
      - ./data/public/uploads:/app/public/uploads
      - ./data/jbrowse2:/web/
      - blast_data:/db/
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - backend

  worker-2:
    build: .
    container_name: emobase_genomics_worker_2
    restart: unless-stopped
    command: ["worker", "-c", "/app/config.yaml"]
    environment:
      MYSQL__HOST: mysql
      MYSQL__PORT: 3306
      MYSQL__USER: ${MYSQL__USER:-emobase}
      MYSQL__PASSWORD: ${MYSQL__PASSWORD}
      MYSQL__DATABASE: ${MYSQL__DATABASE:-emobase_genomics}
      ELASTICSEARCH__ADDRESSES: http://elasticsearch:9200
    volumes:
      - ./data/public/uploads:/app/public/uploads
      - ./data/jbrowse2:/web/
      - blast_data:/db/
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - backend

  mysql:
    image: mysql:8.0
    container_name: emobase_genomics_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL__ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL__DATABASE:-emobase_genomics}
      MYSQL_USER: ${MYSQL__USER:-emobase}
      MYSQL_PASSWORD: ${MYSQL__PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root --password=${MYSQL__ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  elasticsearch:
    image: elasticsearch:8.17.4
    container_name: emobase_genomics_elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sf http://localhost:9200/_cluster/health | grep -v ''"status":"red"''',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: emobase_genomics_nginx
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/public/uploads:/var/www/public/uploads:ro
      - ./data/jbrowse2:/jbrowse2/:ro
    depends_on:
      - api
    networks:
      - backend

  blast:
    image: wurmlab/sequenceserver:latest
    container_name: emobase_genomics_blast
    restart: unless-stopped
    tty: true
    mem_limit: 1g
    # Fix the redirect URL produced after a job is submitted on the BLAST page.
    command:
      - sh
      - -c
      - |
        sed -i 's|redirect to("/#{job.id}")|redirect to("'$${PUBLIC_SERVER}'/blast/#{job.id}")|g' \
          /sequenceserver/lib/sequenceserver/routes.rb
        sequenceserver
    environment:
      - PUBLIC_SERVER=http://localhost:8000
    volumes:
      - blast_data:/db/
    networks:
      - backend

volumes:
  mysql_data:
  elasticsearch_data:
  blast_data:

networks:
  backend:
    driver: bridge
