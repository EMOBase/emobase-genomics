services:
  migrate:
    build: .
    container_name: emobase_genomics_migrate
    restart: no
    command: ["db:migrate", "-c", "/app/config.yaml"]
    environment:
      MYSQL__HOST: mysql
      MYSQL__PORT: 3306
      MYSQL__USER: ${MYSQL__USER:-emobase}
      MYSQL__PASSWORD: ${MYSQL__PASSWORD}
      MYSQL__DATABASE: ${MYSQL__DATABASE:-emobase_genomics}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  api:
    build: .
    container_name: emobase_genomics_api
    restart: unless-stopped
    command: ["api", "-c", "/app/config.yaml"]
    environment:
      HTTP__MODE: ${HTTP__MODE:-release}
      MYSQL__HOST: mysql
      MYSQL__PORT: 3306
      MYSQL__USER: ${MYSQL__USER:-emobase}
      MYSQL__PASSWORD: ${MYSQL__PASSWORD}
      MYSQL__DATABASE: ${MYSQL__DATABASE:-emobase_genomics}
      ELASTICSEARCH__ADDRESSES: http://elasticsearch:9200
    expose:
      - "8080" # internal only, not bound to host
    volumes:
      - ./data/public/uploads:/app/public/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
    networks:
      - backend

  worker:
    build: .
    container_name: emobase_genomics_worker
    restart: unless-stopped
    command: ["worker", "-c", "/app/config.yaml"]
    environment:
      MYSQL__HOST: mysql
      MYSQL__PORT: 3306
      MYSQL__USER: ${MYSQL__USER:-emobase}
      MYSQL__PASSWORD: ${MYSQL__PASSWORD}
      MYSQL__DATABASE: ${MYSQL__DATABASE:-emobase_genomics}
      ELASTICSEARCH__ADDRESSES: http://elasticsearch:9200
    volumes:
      - ./data/public/uploads:/app/public/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
    networks:
      - backend

  mysql:
    image: mysql:8.0
    container_name: emobase_genomics_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL__ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL__DATABASE:-emobase_genomics}
      MYSQL_USER: ${MYSQL__USER:-emobase}
      MYSQL_PASSWORD: ${MYSQL__PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root --password=${MYSQL__ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  elasticsearch:
    image: elasticsearch:8.17.4
    container_name: emobase_genomics_elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sf http://localhost:9200/_cluster/health | grep -v ''"status":"red"''',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/public/uploads:/var/www/public/uploads:ro
    depends_on:
      - api
    networks:
      - backend

volumes:
  mysql_data:
  elasticsearch_data:

networks:
  backend:
    driver: bridge
